name: Build APK Rodrigues Entregador V8.0.3 Pro Real Limpo

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build debug APK
        run: gradle --no-daemon clean :app:assembleDebug --rerun-tasks --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rodrigues-Entregador-V8-0-3-Pro-Real-Corrigido-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
